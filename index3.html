<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorama 2 Jugadores</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

#marcador{
    margin-bottom:20px;
}

#turno{
    color:#facc15;
    margin-bottom:10px;
}

.tablero{
    display:grid;
    grid-template-columns:repeat(4,100px);
    gap:10px;
    justify-content:center;
    margin:auto;
}

.carta{
    width:100px;
    height:100px;
    background:#2563eb;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    cursor:pointer;
    color:transparent;
    transition:all .3s;
}

.carta:hover{
    transform:scale(1.05);
}

.volteada{
    background:white;
    color:black;
}

.encontrada{
    background:#22c55e;
    color:white;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>
</head>
<body>

<h1>🧠 Memorama 2 Jugadores</h1>

<div id="marcador">
    <h2 id="turno">Turno: Jugador 1</h2>
    <h3 id="j1">Jugador 1: 0 puntos</h3>
    <h3 id="j2">Jugador 2: 0 puntos</h3>
</div>

<div class="tablero" id="tablero"></div>

<button onclick="reiniciarPartida()">
Reiniciar Marcador
</button>

<script>

const simbolos = [
'🍎','🍌','🍇','🍉',
'🍒','🥝','🍍','🍓'
];

let cartas = [];
let primeraCarta = null;
let segundaCarta = null;
let bloqueo = false;
let parejasEncontradas = 0;

let jugadorActual = 1;
let puntosJ1 = 0;
let puntosJ2 = 0;

function actualizarMarcador(){

    document.getElementById("turno").textContent =
        "Turno: Jugador " + jugadorActual;

    document.getElementById("j1").textContent =
        "Jugador 1: " + puntosJ1 + " puntos";

    document.getElementById("j2").textContent =
        "Jugador 2: " + puntosJ2 + " puntos";
}

function iniciarJuego(){

    const tablero =
    document.getElementById("tablero");

    tablero.innerHTML = "";

    cartas = [...simbolos, ...simbolos];

    cartas.sort(() => Math.random() - 0.5);

    primeraCarta = null;
    segundaCarta = null;
    bloqueo = false;
    parejasEncontradas = 0;

    cartas.forEach(simbolo => {

        const carta =
        document.createElement("div");

        carta.classList.add("carta");
        carta.dataset.simbolo = simbolo;
        carta.textContent = simbolo;

        carta.addEventListener(
            "click",
            voltearCarta
        );

        tablero.appendChild(carta);
    });

    actualizarMarcador();
}

function voltearCarta(){

    if(
        bloqueo ||
        this.classList.contains("volteada") ||
        this.classList.contains("encontrada")
    ){
        return;
    }

    this.classList.add("volteada");

    if(!primeraCarta){
        primeraCarta = this;
        return;
    }

    segundaCarta = this;
    bloqueo = true;

    if(
        primeraCarta.dataset.simbolo ===
        segundaCarta.dataset.simbolo
    ){

        primeraCarta.classList.add("encontrada");
        segundaCarta.classList.add("encontrada");

        if(jugadorActual === 1){
            puntosJ1++;
        }else{
            puntosJ2++;
        }

        parejasEncontradas++;

        primeraCarta = null;
        segundaCarta = null;
        bloqueo = false;

        actualizarMarcador();

        if(
            parejasEncontradas === simbolos.length
        ){

            let mensaje = "";

            if(puntosJ1 > puntosJ2){
                mensaje =
                "🏆 Ganó el Jugador 1";
            }
            else if(puntosJ2 > puntosJ1){
                mensaje =
                "🏆 Ganó el Jugador 2";
            }
            else{
                mensaje =
                "🤝 Empate";
            }

            setTimeout(() => {

                alert(
                    mensaje +
                    "\n\nComienza una nueva ronda."
                );

                iniciarJuego();

            }, 700);
        }

    }else{

        setTimeout(() => {

            primeraCarta.classList.remove(
                "volteada"
            );

            segundaCarta.classList.remove(
                "volteada"
            );

            primeraCarta = null;
            segundaCarta = null;

            jugadorActual =
            jugadorActual === 1 ? 2 : 1;

            actualizarMarcador();

            bloqueo = false;

        },1000);
    }
}

function reiniciarPartida(){

    puntosJ1 = 0;
    puntosJ2 = 0;
    jugadorActual = 1;

    iniciarJuego();
}

iniciarJuego();

</script>

</body>
</html>
